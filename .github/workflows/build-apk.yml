name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ───────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 3. Flutter (latest stable, no version pin) ───────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # ── 4. Android SDK — accept licenses ─────────────────────────────────────
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 5. Install Flutter dependencies ──────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      # ── 6. Build release APK ──────────────────────────────────────────────────
      - name: Build release APK
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons

      # ── 7. Rename with date ───────────────────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d')
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             LexBot-v1.0-${DATE}.apk
          echo "APK_NAME=LexBot-v1.0-${DATE}.apk" >> $GITHUB_ENV

      # ── 8. Upload as artifact ─────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 30

      # ── 9. Create GitHub Release ──────────────────────────────────────────────
      - name: Delete previous latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            "${{ env.APK_NAME }}" \
            --title "LexBot Android App — $(date +'%d %b %Y')" \
            --notes "## LexBot DPDP Learning Agent

          **Install on Android:**
          1. Download **${{ env.APK_NAME }}** below
          2. Open the file on your Android phone
          3. If prompted, enable *Install from unknown sources* → tap Install

          Built from commit \`${{ github.sha }}\` on $(date +'%d %b %Y %H:%M UTC')" \
            --latest
