name: Build & Release Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git \
            --depth 1 -b stable /opt/flutter
          echo "/opt/flutter/bin" >> $GITHUB_PATH

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Build APK
        working-directory: flutter_app
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          DATE=$(date +'%Y%m%d')
          cp flutter_app/build/app/outputs/flutter-apk/app-release.apk \
             LexBot-v1.0-${DATE}.apk
          echo "APK_NAME=LexBot-v1.0-${DATE}.apk" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_NAME }}
          retention-days: 30

      - name: Delete old release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest \
            "${{ env.APK_NAME }}" \
            --title "LexBot Android — $(date +'%d %b %Y')" \
            --notes "## LexBot DPDP Learning Agent

          **Install:**
          1. Download the APK below
          2. Open it on your Android phone
          3. Tap Install (allow unknown sources if prompted)

          Built $(date +'%d %b %Y %H:%M UTC')" \
            --latest
